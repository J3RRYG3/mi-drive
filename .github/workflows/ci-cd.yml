name: CI/CD — miDrive

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── CI: Lint y Build (todo PR y push a main) ─────────────────────────────────
  ci:
    name: CI — Lint & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint frontend
        run: npm run lint -w apps/frontend

      - name: Lint backend
        run: npm run lint -w apps/backend

      - name: Build frontend
        run: npm run build -w apps/frontend

      - name: Build backend
        run: npm run build -w apps/backend
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

  # ── Migraciones Prisma (solo push a main) ────────────────────────────────────
  # PREREQUISITO: ejecutar `npx prisma migrate dev --name init` localmente
  # con el Docker local corriendo (docker compose up db) y commitear
  # el directorio apps/backend/prisma/migrations/ antes del primer deploy.
  migrate:
    name: DB — Prisma Migrate Deploy
    runs-on: ubuntu-latest
    needs: ci
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Prisma migrations
        working-directory: apps/backend
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

  # ── Deploy Backend → Cloud Run ────────────────────────────────────────────────
  deploy-backend:
    name: Deploy Backend → Cloud Run
    runs-on: ubuntu-latest
    needs: migrate
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    env:
      IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/midrive-backend

    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build backend image
        run: |
          docker build \
            -f apps/backend/Dockerfile \
            -t $IMAGE:${{ github.sha }} \
            -t $IMAGE:latest \
            .

      - name: Push backend image
        run: |
          docker push $IMAGE:${{ github.sha }}
          docker push $IMAGE:latest

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      # Nota: GCP_PRIVATE_KEY debe estar almacenado en el secret con \n literales
      # (no saltos de línea reales). El backend debe hacer .replace(/\\n/g, '\n')
      # al usar la clave. Las repos de Docker Hub deben ser públicas para que
      # Cloud Run pueda hacer pull sin autenticación adicional.
      - name: Deploy backend to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: midrive-app-service
          region: us-central1
          image: docker.io/${{ secrets.DOCKERHUB_USERNAME }}/midrive-backend:${{ github.sha }}
          flags: --allow-unauthenticated
          env_vars: |-
            NODE_ENV=production
            GCP_PROJECT_ID=${{ secrets.GCP_PROJECT_ID }}
            GCP_CLIENT_EMAIL=${{ secrets.GCP_CLIENT_EMAIL }}
            GCP_BUCKET_NAME=${{ secrets.GCP_BUCKET_NAME }}
            GCP_PRIVATE_KEY=${{ secrets.GCP_PRIVATE_KEY }}
            AWS_REGION=${{ secrets.AWS_REGION }}
            AWS_COGNITO_USER_POOL_ID=${{ secrets.AWS_COGNITO_USER_POOL_ID }}
            AWS_COGNITO_CLIENT_ID=${{ secrets.AWS_COGNITO_CLIENT_ID }}
            AZURE_SQL_SERVER=${{ secrets.AZURE_SQL_SERVER }}
            AZURE_SQL_DATABASE=${{ secrets.AZURE_SQL_DATABASE }}
            AZURE_SQL_USER=${{ secrets.AZURE_SQL_USER }}
            AZURE_SQL_PASSWORD=${{ secrets.AZURE_SQL_PASSWORD }}
            DATABASE_URL=${{ secrets.DATABASE_URL }}

  # ── Deploy Frontend → Cloud Run ───────────────────────────────────────────────
  deploy-frontend:
    name: Deploy Frontend → Cloud Run
    runs-on: ubuntu-latest
    needs: deploy-backend
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    env:
      IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/midrive-frontend

    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build frontend image
        run: |
          docker build \
            -f apps/frontend/Dockerfile \
            -t $IMAGE:${{ github.sha }} \
            -t $IMAGE:latest \
            .

      - name: Push frontend image
        run: |
          docker push $IMAGE:${{ github.sha }}
          docker push $IMAGE:latest

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy frontend to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: midrive-frontend-service
          region: us-central1
          image: docker.io/${{ secrets.DOCKERHUB_USERNAME }}/midrive-frontend:${{ github.sha }}
          flags: --allow-unauthenticated --port=3000
          env_vars: BACKEND_URL=https://midrive-app-service-hvwrjcwx3q-uc.a.run.app
